name: Refresh dashboard data

# Runs every 30 minutes and whenever triggered manually.
# It calls scripts/fetch_data.py, which you need to fill in once you know
# your data source (see README.md for the two supported paths).
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest data
        env:
          # Add your API credentials as repo secrets (Settings -> Secrets and variables -> Actions)
          # Never put credentials directly in this file.
          EKART_API_TOKEN: ${{ secrets.EKART_API_TOKEN }}
        run: python scripts/fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "dashboard-bot"
          git config user.email "dashboard-bot@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Auto-refresh dashboard data"
          git push
